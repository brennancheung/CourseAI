<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VQ-VAE Tokenization Pipeline</title>
<style>
  :root {
    --bg-primary: #ffffff;
    --text-tertiary: #9c9a92;
    --font-sans: system-ui, -apple-system, "Segoe UI", sans-serif;

    --blue-50: #E6F1FB; --blue-100: #B5D4F4; --blue-200: #85B7EB;
    --blue-600: #185FA5; --blue-800: #0C447C; --blue-900: #042C53;
    --purple-50: #EEEDFE; --purple-100: #CECBF6; --purple-200: #AFA9EC;
    --purple-600: #534AB7; --purple-800: #3C3489; --purple-900: #26215C;
    --amber-50: #FAEEDA; --amber-100: #FAC775; --amber-200: #EF9F27;
    --amber-600: #854F0B; --amber-800: #633806; --amber-900: #412402;
    --teal-50: #E1F5EE; --teal-100: #9FE1CB; --teal-200: #5DCAA5;
    --teal-600: #0F6E56; --teal-800: #085041; --teal-900: #04342C;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1a1a1a;
      --text-tertiary: #6b6b65;
    }
  }

  body {
    margin: 0;
    padding: 20px;
    background: var(--bg-primary);
    font-family: var(--font-sans);
  }

  .th { font-family: var(--font-sans); font-size: 14px; font-weight: 500; }
  .ts { font-family: var(--font-sans); font-size: 12px; font-weight: 400; }
  .arr { stroke: var(--text-tertiary); stroke-width: 1.5; }

  .c-blue > rect { fill: var(--blue-50); stroke: var(--blue-600); }
  .c-blue > .th  { fill: var(--blue-800); }
  .c-blue > .ts  { fill: var(--blue-600); }

  .c-purple > rect { fill: var(--purple-50); stroke: var(--purple-600); }
  .c-purple > .th  { fill: var(--purple-800); }
  .c-purple > .ts  { fill: var(--purple-600); }

  .c-amber > rect { fill: var(--amber-50); stroke: var(--amber-600); }
  .c-amber > .th  { fill: var(--amber-800); }
  .c-amber > .ts  { fill: var(--amber-600); }

  .c-teal > rect { fill: var(--teal-50); stroke: var(--teal-600); }
  .c-teal > .th  { fill: var(--teal-800); }
  .c-teal > .ts  { fill: var(--teal-600); }

  @media (prefers-color-scheme: dark) {
    .c-blue > rect { fill: var(--blue-900); stroke: var(--blue-200); }
    .c-blue > .th  { fill: var(--blue-100); }
    .c-blue > .ts  { fill: var(--blue-200); }

    .c-purple > rect { fill: var(--purple-900); stroke: var(--purple-200); }
    .c-purple > .th  { fill: var(--purple-100); }
    .c-purple > .ts  { fill: var(--purple-200); }

    .c-amber > rect { fill: var(--amber-900); stroke: var(--amber-200); }
    .c-amber > .th  { fill: var(--amber-100); }
    .c-amber > .ts  { fill: var(--amber-200); }

    .c-teal > rect { fill: var(--teal-900); stroke: var(--teal-200); }
    .c-teal > .th  { fill: var(--teal-100); }
    .c-teal > .ts  { fill: var(--teal-200); }
  }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 252">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <g class="c-blue">
    <rect x="58" y="40" width="152" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="134" y="58" text-anchor="middle" dominant-baseline="central">256x256 Image</text>
    <text class="ts" x="134" y="76" text-anchor="middle" dominant-baseline="central">Input photograph</text>
  </g>

  <line x1="210" y1="68" x2="240" y2="68" class="arr" marker-end="url(#arrow)"/>

  <g class="c-purple">
    <rect x="240" y="40" width="160" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="320" y="58" text-anchor="middle" dominant-baseline="central">VQ-VAE Encoder</text>
    <text class="ts" x="320" y="76" text-anchor="middle" dominant-baseline="central">Neural network</text>
  </g>

  <line x1="400" y1="68" x2="430" y2="68" class="arr" marker-end="url(#arrow)"/>

  <g class="c-purple">
    <rect x="430" y="40" width="192" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="526" y="58" text-anchor="middle" dominant-baseline="central">Continuous Vectors</text>
    <text class="ts" x="526" y="76" text-anchor="middle" dominant-baseline="central">32x32 grid</text>
  </g>

  <path d="M526 96 L526 126 L142 126 L142 156" fill="none" class="arr" marker-end="url(#arrow)"/>

  <g class="c-amber">
    <rect x="58" y="156" width="168" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="142" y="174" text-anchor="middle" dominant-baseline="central">Codebook Lookup</text>
    <text class="ts" x="142" y="192" text-anchor="middle" dominant-baseline="central">Nearest neighbor</text>
  </g>

  <line x1="226" y1="184" x2="256" y2="184" class="arr" marker-end="url(#arrow)"/>

  <g class="c-amber">
    <rect x="256" y="156" width="160" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="336" y="174" text-anchor="middle" dominant-baseline="central">Integer Tokens</text>
    <text class="ts" x="336" y="192" text-anchor="middle" dominant-baseline="central">1,024 per image</text>
  </g>

  <line x1="416" y1="184" x2="446" y2="184" class="arr" marker-end="url(#arrow)"/>

  <g class="c-teal">
    <rect x="446" y="156" width="176" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="534" y="174" text-anchor="middle" dominant-baseline="central">Text-compatible</text>
    <text class="ts" x="534" y="192" text-anchor="middle" dominant-baseline="central">Same token format</text>
  </g>
</svg>
</body>
</html>
