<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAM Evolution</title>
<style>
  :root {
    --bg-primary: #ffffff;
    --text-tertiary: #9c9a92;
    --font-sans: system-ui, -apple-system, "Segoe UI", sans-serif;

    --blue-50: #E6F1FB; --blue-100: #B5D4F4; --blue-200: #85B7EB;
    --blue-600: #185FA5; --blue-800: #0C447C; --blue-900: #042C53;
    --purple-50: #EEEDFE; --purple-100: #CECBF6; --purple-200: #AFA9EC;
    --purple-600: #534AB7; --purple-800: #3C3489; --purple-900: #26215C;
    --teal-50: #E1F5EE; --teal-100: #9FE1CB; --teal-200: #5DCAA5;
    --teal-600: #0F6E56; --teal-800: #085041; --teal-900: #04342C;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1a1a1a;
      --text-tertiary: #6b6b65;
    }
  }

  body {
    margin: 0;
    padding: 20px;
    background: var(--bg-primary);
    font-family: var(--font-sans);
  }

  .th { font-family: var(--font-sans); font-size: 14px; font-weight: 500; }
  .ts { font-family: var(--font-sans); font-size: 12px; font-weight: 400; }
  .arr { stroke: var(--text-tertiary); stroke-width: 1.5; }
  .lbl { fill: var(--text-tertiary); }

  .c-blue > rect { fill: var(--blue-50); stroke: var(--blue-600); }
  .c-blue > .th  { fill: var(--blue-800); }
  .c-blue > .ts  { fill: var(--blue-600); }

  .c-purple > rect { fill: var(--purple-50); stroke: var(--purple-600); }
  .c-purple > .th  { fill: var(--purple-800); }
  .c-purple > .ts  { fill: var(--purple-600); }

  .c-teal > rect { fill: var(--teal-50); stroke: var(--teal-600); }
  .c-teal > .th  { fill: var(--teal-800); }
  .c-teal > .ts  { fill: var(--teal-600); }

  @media (prefers-color-scheme: dark) {
    .c-blue > rect { fill: var(--blue-900); stroke: var(--blue-200); }
    .c-blue > .th  { fill: var(--blue-100); }
    .c-blue > .ts  { fill: var(--blue-200); }

    .c-purple > rect { fill: var(--purple-900); stroke: var(--purple-200); }
    .c-purple > .th  { fill: var(--purple-100); }
    .c-purple > .ts  { fill: var(--purple-200); }

    .c-teal > rect { fill: var(--teal-900); stroke: var(--teal-200); }
    .c-teal > .th  { fill: var(--teal-100); }
    .c-teal > .ts  { fill: var(--teal-200); }
  }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 136">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Node 1: SAM 1 (blue) -->
  <!-- "SAM 1 (2023)" = 13 chars * 8 = 104px, box = 140px. OK -->
  <!-- "Images" = 6 chars * 6.5 = 39px. OK -->
  <g class="c-blue">
    <rect x="40" y="40" width="140" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="110" y="58" text-anchor="middle" dominant-baseline="central">SAM 1 (2023)</text>
    <text class="ts" x="110" y="76" text-anchor="middle" dominant-baseline="central">Images</text>
  </g>

  <!-- Arrow 1→2 with label "+ memory" -->
  <line x1="180" y1="68" x2="246" y2="68" class="arr" marker-end="url(#arrow)"/>
  <text class="ts lbl" x="213" y="56" text-anchor="middle" dominant-baseline="central">+ memory</text>

  <!-- Node 2: SAM 2 (purple) -->
  <!-- "SAM 2 (2024)" = 13 chars * 8 = 104px, box = 152px. OK -->
  <!-- "+ Video" = 7 chars * 6.5 = 45.5px. OK -->
  <g class="c-purple">
    <rect x="252" y="40" width="152" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="328" y="58" text-anchor="middle" dominant-baseline="central">SAM 2 (2024)</text>
    <text class="ts" x="328" y="76" text-anchor="middle" dominant-baseline="central">+ Video</text>
  </g>

  <!-- Arrow 2→3 with label "+ language" -->
  <line x1="404" y1="68" x2="470" y2="68" class="arr" marker-end="url(#arrow)"/>
  <text class="ts lbl" x="437" y="56" text-anchor="middle" dominant-baseline="central">+ language</text>

  <!-- Node 3: SAM 3 (teal) -->
  <!-- "SAM 3 (2025)" = 13 chars * 8 = 104px, box = 172px. OK -->
  <!-- "+ Concepts/Text" = 15 chars * 6.5 = 97.5px. OK -->
  <g class="c-teal">
    <rect x="476" y="40" width="164" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="558" y="58" text-anchor="middle" dominant-baseline="central">SAM 3 (2025)</text>
    <text class="ts" x="558" y="76" text-anchor="middle" dominant-baseline="central">+ Concepts/Text</text>
  </g>
</svg>
</body>
</html>
