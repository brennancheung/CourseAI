<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Generation Pipeline</title>
<style>
  :root {
    --bg-primary: #ffffff;
    --text-tertiary: #9c9a92;
    --font-sans: system-ui, -apple-system, "Segoe UI", sans-serif;

    --blue-50: #E6F1FB; --blue-100: #B5D4F4; --blue-200: #85B7EB;
    --blue-600: #185FA5; --blue-800: #0C447C; --blue-900: #042C53;
    --amber-50: #FAEEDA; --amber-100: #FAC775; --amber-200: #EF9F27;
    --amber-600: #854F0B; --amber-800: #633806; --amber-900: #412402;
    --purple-50: #EEEDFE; --purple-100: #CECBF6; --purple-200: #AFA9EC;
    --purple-600: #534AB7; --purple-800: #3C3489; --purple-900: #26215C;
    --green-50: #EAF3DE; --green-100: #C0DD97; --green-200: #97C459;
    --green-600: #3B6D11; --green-800: #27500A; --green-900: #173404;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1a1a1a;
      --text-tertiary: #6b6b65;
    }
  }

  body {
    margin: 0;
    padding: 20px;
    background: var(--bg-primary);
    font-family: var(--font-sans);
  }

  .th { font-family: var(--font-sans); font-size: 14px; font-weight: 500; }
  .ts { font-family: var(--font-sans); font-size: 12px; font-weight: 400; }
  .arr { stroke: var(--text-tertiary); stroke-width: 1.5; }

  .c-blue > rect { fill: var(--blue-50); stroke: var(--blue-600); }
  .c-blue > .th  { fill: var(--blue-800); }
  .c-blue > .ts  { fill: var(--blue-600); }

  .c-amber > rect { fill: var(--amber-50); stroke: var(--amber-600); }
  .c-amber > .th  { fill: var(--amber-800); }
  .c-amber > .ts  { fill: var(--amber-600); }

  .c-purple > rect { fill: var(--purple-50); stroke: var(--purple-600); }
  .c-purple > .th  { fill: var(--purple-800); }
  .c-purple > .ts  { fill: var(--purple-600); }

  .c-green > rect { fill: var(--green-50); stroke: var(--green-600); }
  .c-green > .th  { fill: var(--green-800); }
  .c-green > .ts  { fill: var(--green-600); }

  @media (prefers-color-scheme: dark) {
    .c-blue > rect { fill: var(--blue-900); stroke: var(--blue-200); }
    .c-blue > .th  { fill: var(--blue-100); }
    .c-blue > .ts  { fill: var(--blue-200); }

    .c-amber > rect { fill: var(--amber-900); stroke: var(--amber-200); }
    .c-amber > .th  { fill: var(--amber-100); }
    .c-amber > .ts  { fill: var(--amber-200); }

    .c-purple > rect { fill: var(--purple-900); stroke: var(--purple-200); }
    .c-purple > .th  { fill: var(--purple-100); }
    .c-purple > .ts  { fill: var(--purple-200); }

    .c-green > rect { fill: var(--green-900); stroke: var(--green-200); }
    .c-green > .th  { fill: var(--green-100); }
    .c-green > .ts  { fill: var(--green-200); }
  }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 716">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <g class="c-blue">
    <rect x="220" y="40" width="240" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="58" text-anchor="middle" dominant-baseline="central">User prompt</text>
    <text class="ts" x="340" y="76" text-anchor="middle" dominant-baseline="central">Text input</text>
  </g>

  <line x1="340" y1="96" x2="340" y2="156" class="arr" marker-end="url(#arrow)"/>

  <g class="c-blue">
    <rect x="220" y="156" width="240" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="174" text-anchor="middle" dominant-baseline="central">Gemini 3 Pro backbone</text>
    <text class="ts" x="340" y="192" text-anchor="middle" dominant-baseline="central">Language model</text>
  </g>

  <line x1="340" y1="212" x2="340" y2="272" class="arr" marker-end="url(#arrow)"/>

  <g class="c-amber">
    <rect x="220" y="272" width="240" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="290" text-anchor="middle" dominant-baseline="central">Thinking tokens</text>
    <text class="ts" x="340" y="308" text-anchor="middle" dominant-baseline="central">Composition planning</text>
  </g>

  <line x1="340" y1="328" x2="340" y2="388" class="arr" marker-end="url(#arrow)"/>

  <g class="c-purple">
    <rect x="220" y="388" width="240" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="406" text-anchor="middle" dominant-baseline="central">Image token generation</text>
    <text class="ts" x="340" y="424" text-anchor="middle" dominant-baseline="central">~1,120 tokens sequentially</text>
  </g>

  <line x1="340" y1="444" x2="340" y2="504" class="arr" marker-end="url(#arrow)"/>

  <g class="c-green">
    <rect x="220" y="504" width="240" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="522" text-anchor="middle" dominant-baseline="central">GemPix 2 decoder</text>
    <text class="ts" x="340" y="540" text-anchor="middle" dominant-baseline="central">Tokens to pixels</text>
  </g>

  <line x1="340" y1="560" x2="340" y2="620" class="arr" marker-end="url(#arrow)"/>

  <g class="c-green">
    <rect x="220" y="620" width="240" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="638" text-anchor="middle" dominant-baseline="central">High-resolution image</text>
    <text class="ts" x="340" y="656" text-anchor="middle" dominant-baseline="central">Final output</text>
  </g>
</svg>
</body>
</html>
