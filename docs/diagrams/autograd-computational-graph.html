<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Computational graph with gradient flow</title>
<style>
:root {
  --bg-primary: #ffffff;
  --bg-secondary: #f5f5f0;
  --text-primary: #1a1a1a;
  --text-secondary: #6b6b65;
  --text-tertiary: #9c9a92;
  --border-default: rgba(0,0,0,0.15);
  --font-sans: system-ui, -apple-system, "Segoe UI", sans-serif;

  --purple-50: #EEEDFE; --purple-100: #CECBF6; --purple-200: #AFA9EC;
  --purple-600: #534AB7; --purple-800: #3C3489; --purple-900: #26215C;
  --coral-50: #FAECE7; --coral-100: #F5C4B3; --coral-200: #F0997B;
  --coral-600: #993C1D; --coral-800: #712B13; --coral-900: #4A1B0C;
  --gray-50: #F1EFE8; --gray-100: #D3D1C7; --gray-200: #B4B2A9;
  --gray-600: #5F5E5A; --gray-800: #444441; --gray-900: #2C2C2A;
  --blue-50: #E6F1FB; --blue-100: #B5D4F4; --blue-200: #85B7EB;
  --blue-600: #185FA5; --blue-800: #0C447C; --blue-900: #042C53;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg-primary: #1a1a1a;
    --bg-secondary: #2c2c2a;
    --text-primary: #e8e6df;
    --text-secondary: #9c9a92;
    --text-tertiary: #6b6b65;
    --border-default: rgba(255,255,255,0.15);
  }
}

body {
  margin: 0;
  padding: 20px;
  background: var(--bg-primary);
  font-family: var(--font-sans);
}

.th { font-family: var(--font-sans); font-size: 14px; font-weight: 500; fill: var(--text-primary); }
.ts { font-family: var(--font-sans); font-size: 12px; font-weight: 400; fill: var(--text-secondary); }

.arr { stroke: var(--text-tertiary); stroke-width: 1.5; }

.c-purple > rect { fill: var(--purple-50); stroke: var(--purple-600); }
.c-purple > .th  { fill: var(--purple-800); }
.c-purple > .ts  { fill: var(--purple-600); }

.c-coral > rect { fill: var(--coral-50); stroke: var(--coral-600); }
.c-coral > .th  { fill: var(--coral-800); }
.c-coral > .ts  { fill: var(--coral-600); }

.c-gray > rect { fill: var(--gray-50); stroke: var(--gray-600); }
.c-gray > .th  { fill: var(--gray-800); }
.c-gray > .ts  { fill: var(--gray-600); }

.c-blue > rect { fill: var(--blue-50); stroke: var(--blue-600); }
.c-blue > .th  { fill: var(--blue-800); }
.c-blue > .ts  { fill: var(--blue-600); }

@media (prefers-color-scheme: dark) {
  .c-purple > rect { fill: var(--purple-900); stroke: var(--purple-200); }
  .c-purple > .th  { fill: var(--purple-100); }
  .c-purple > .ts  { fill: var(--purple-200); }

  .c-coral > rect { fill: var(--coral-900); stroke: var(--coral-200); }
  .c-coral > .th  { fill: var(--coral-100); }
  .c-coral > .ts  { fill: var(--coral-200); }

  .c-gray > rect { fill: var(--gray-900); stroke: var(--gray-200); }
  .c-gray > .th  { fill: var(--gray-100); }
  .c-gray > .ts  { fill: var(--gray-200); }

  .c-blue > rect { fill: var(--blue-900); stroke: var(--blue-200); }
  .c-blue > .th  { fill: var(--blue-100); }
  .c-blue > .ts  { fill: var(--blue-200); }
}
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 300">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
          markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
          stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ========== PARAMETER NODES (top row, y=40) ========== -->
<!-- w1: centered above w1*x op (center x=138) -->
<g class="c-purple">
  <rect x="78" y="40" width="120" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="138" y="58" text-anchor="middle" dominant-baseline="central">w1 = 0.5</text>
  <text class="ts" x="138" y="78" text-anchor="middle" dominant-baseline="central">grad: 1.356</text>
</g>

<!-- b1: centered above +b1 op (center x=236) -->
<g class="c-purple">
  <rect x="206" y="40" width="120" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="266" y="58" text-anchor="middle" dominant-baseline="central">b1 = 0.1</text>
  <text class="ts" x="266" y="78" text-anchor="middle" dominant-baseline="central">grad: 0.678</text>
</g>

<!-- w2: between b1 and b2, above w2*a1 op (center x=430) -->
<g class="c-purple">
  <rect x="365" y="40" width="130" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="430" y="58" text-anchor="middle" dominant-baseline="central">w2 = -0.3</text>
  <text class="ts" x="430" y="78" text-anchor="middle" dominant-baseline="central">grad: -2.486</text>
</g>

<!-- b2: above +b2 op (center x=528) -->
<g class="c-purple">
  <rect x="503" y="40" width="130" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="568" y="58" text-anchor="middle" dominant-baseline="central">b2 = 0.2</text>
  <text class="ts" x="568" y="78" text-anchor="middle" dominant-baseline="central">grad: -2.260</text>
</g>

<!-- ========== ARROWS: params → operations ========== -->
<line x1="138" y1="96" x2="138" y2="162" class="arr" marker-end="url(#arrow)"/>
<line x1="266" y1="96" x2="236" y2="162" class="arr" marker-end="url(#arrow)"/>
<line x1="430" y1="96" x2="430" y2="162" class="arr" marker-end="url(#arrow)"/>
<line x1="568" y1="96" x2="528" y2="162" class="arr" marker-end="url(#arrow)"/>

<!-- ========== OPERATION NODES (bottom row, y=168, height=56) ========== -->
<!-- Layout: 7 nodes across 600px (x=40 to x=640)
     x:      40, w=52   → ends 92
     w1*x:  108, w=78   → ends 186   (gap 16)
     +b1:   202, w=78   → ends 280   (gap 16)
     ReLU:  296, w=78   → ends 374   (gap 16)
     w2*a1: 390, w=82   → ends 472   (gap 16)
     +b2:   488, w=82   → ends 570   (gap 16)
     MSE:   586, w=54   → ends 640   (gap 16)

     Total: 52+16+78+16+78+16+78+16+82+16+82+16+54 = 600 ✓
-->

<!-- x = 2.0 (input, blue) -->
<g class="c-blue">
  <rect x="40" y="168" width="52" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="66" y="186" text-anchor="middle" dominant-baseline="central">x</text>
  <text class="ts" x="66" y="206" text-anchor="middle" dominant-baseline="central">2.0</text>
</g>

<!-- arrow x → w1*x -->
<line x1="92" y1="196" x2="106" y2="196" class="arr" marker-end="url(#arrow)"/>

<!-- w1*x (gray op) -->
<g class="c-gray">
  <rect x="108" y="168" width="78" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="147" y="186" text-anchor="middle" dominant-baseline="central">w1*x</text>
  <text class="ts" x="147" y="206" text-anchor="middle" dominant-baseline="central">= 1.0</text>
</g>

<!-- arrow w1*x → +b1 -->
<line x1="186" y1="196" x2="200" y2="196" class="arr" marker-end="url(#arrow)"/>

<!-- +b1 (gray op) -->
<g class="c-gray">
  <rect x="202" y="168" width="78" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="241" y="186" text-anchor="middle" dominant-baseline="central">+ b1</text>
  <text class="ts" x="241" y="206" text-anchor="middle" dominant-baseline="central">z1 = 1.1</text>
</g>

<!-- arrow +b1 → ReLU -->
<line x1="280" y1="196" x2="294" y2="196" class="arr" marker-end="url(#arrow)"/>

<!-- ReLU (gray op) -->
<g class="c-gray">
  <rect x="296" y="168" width="78" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="335" y="186" text-anchor="middle" dominant-baseline="central">ReLU</text>
  <text class="ts" x="335" y="206" text-anchor="middle" dominant-baseline="central">a1 = 1.1</text>
</g>

<!-- arrow ReLU → w2*a1 -->
<line x1="374" y1="196" x2="388" y2="196" class="arr" marker-end="url(#arrow)"/>

<!-- w2*a1 (gray op) -->
<g class="c-gray">
  <rect x="390" y="168" width="82" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="431" y="186" text-anchor="middle" dominant-baseline="central">w2*a1</text>
  <text class="ts" x="431" y="206" text-anchor="middle" dominant-baseline="central">= -0.33</text>
</g>

<!-- arrow w2*a1 → +b2 -->
<line x1="472" y1="196" x2="486" y2="196" class="arr" marker-end="url(#arrow)"/>

<!-- +b2 (gray op) -->
<g class="c-gray">
  <rect x="488" y="168" width="82" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="529" y="186" text-anchor="middle" dominant-baseline="central">+ b2</text>
  <text class="ts" x="529" y="206" text-anchor="middle" dominant-baseline="central">ŷ = -0.13</text>
</g>

<!-- arrow +b2 → MSE -->
<line x1="570" y1="196" x2="584" y2="196" class="arr" marker-end="url(#arrow)"/>

<!-- MSE loss (coral) -->
<g class="c-coral">
  <rect x="586" y="168" width="54" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="613" y="186" text-anchor="middle" dominant-baseline="central">MSE</text>
  <text class="ts" x="613" y="206" text-anchor="middle" dominant-baseline="central">1.2769</text>
</g>

<!-- ========== FLOW DIRECTION LABEL ========== -->
<text class="ts" x="340" y="260" text-anchor="middle" dominant-baseline="central" opacity="0.45">forward pass &#x2192;</text>

</svg>
</body>
</html>
