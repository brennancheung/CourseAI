<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLIP dual-encoder architecture</title>
<style>
:root {
  --bg-primary: #ffffff;
  --bg-secondary: #f5f5f0;
  --text-primary: #1a1a1a;
  --text-secondary: #6b6b65;
  --text-tertiary: #9c9a92;
  --border-default: rgba(0,0,0,0.15);
  --font-sans: system-ui, -apple-system, "Segoe UI", sans-serif;

  --blue-50: #E6F1FB; --blue-100: #B5D4F4; --blue-200: #85B7EB;
  --blue-400: #378ADD; --blue-600: #185FA5; --blue-800: #0C447C; --blue-900: #042C53;
  --purple-50: #EEEDFE; --purple-100: #CECBF6; --purple-200: #AFA9EC;
  --purple-400: #7F77DD; --purple-600: #534AB7; --purple-800: #3C3489; --purple-900: #26215C;
  --amber-50: #FAEEDA; --amber-100: #FAC775; --amber-200: #EF9F27;
  --amber-400: #BA7517; --amber-600: #854F0B; --amber-800: #633806; --amber-900: #412402;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg-primary: #1a1a1a;
    --bg-secondary: #2c2c2a;
    --text-primary: #e8e6df;
    --text-secondary: #9c9a92;
    --text-tertiary: #6b6b65;
    --border-default: rgba(255,255,255,0.15);
  }
}

body {
  margin: 0;
  padding: 20px;
  background: var(--bg-primary);
  font-family: var(--font-sans);
}

.th { font-family: var(--font-sans); font-size: 14px; font-weight: 500; fill: var(--text-primary); }
.ts { font-family: var(--font-sans); font-size: 12px; font-weight: 400; fill: var(--text-secondary); }
.arr { stroke: var(--text-tertiary); stroke-width: 1.5; }

.c-blue > rect { fill: var(--blue-50); stroke: var(--blue-600); }
.c-blue > .th { fill: var(--blue-800); }
.c-blue > .ts { fill: var(--blue-600); }

.c-purple > rect { fill: var(--purple-50); stroke: var(--purple-600); }
.c-purple > .th { fill: var(--purple-800); }
.c-purple > .ts { fill: var(--purple-600); }

.c-amber > rect { fill: var(--amber-50); stroke: var(--amber-600); }
.c-amber > .th { fill: var(--amber-800); }
.c-amber > .ts { fill: var(--amber-600); }

@media (prefers-color-scheme: dark) {
  .c-blue > rect { fill: var(--blue-900); stroke: var(--blue-200); }
  .c-blue > .th { fill: var(--blue-100); }
  .c-blue > .ts { fill: var(--blue-200); }

  .c-purple > rect { fill: var(--purple-900); stroke: var(--purple-200); }
  .c-purple > .th { fill: var(--purple-100); }
  .c-purple > .ts { fill: var(--purple-200); }

  .c-amber > rect { fill: var(--amber-900); stroke: var(--amber-200); }
  .c-amber > .th { fill: var(--amber-100); }
  .c-amber > .ts { fill: var(--amber-200); }
}
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 348">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Row 1: Image path (blue) — y=40, h=56 -->
  <!-- Col 1: Image input — x=64, w=120 -->
  <g class="c-blue">
    <rect x="64" y="40" width="120" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="124" y="58" text-anchor="middle" dominant-baseline="central">Image</text>
    <text class="ts" x="124" y="78" text-anchor="middle" dominant-baseline="central">224 x 224</text>
  </g>

  <!-- Arrow: Image → Image encoder -->
  <line x1="184" y1="68" x2="224" y2="68" class="arr" marker-end="url(#arrow)"/>

  <!-- Col 2: Image encoder — x=230, w=160 -->
  <g class="c-blue">
    <rect x="230" y="40" width="160" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="310" y="58" text-anchor="middle" dominant-baseline="central">Image encoder</text>
    <text class="ts" x="310" y="78" text-anchor="middle" dominant-baseline="central">ResNet or ViT</text>
  </g>

  <!-- Arrow: Image encoder → Image vector -->
  <line x1="390" y1="68" x2="430" y2="68" class="arr" marker-end="url(#arrow)"/>

  <!-- Col 3: Image vector — x=436, w=152 -->
  <g class="c-blue">
    <rect x="436" y="40" width="152" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="512" y="58" text-anchor="middle" dominant-baseline="central">Image vector</text>
    <text class="ts" x="512" y="78" text-anchor="middle" dominant-baseline="central">512-dim</text>
  </g>

  <!-- Row 2: Text path (purple) — y=156, h=56 -->
  <!-- Col 1: Caption input — x=64, w=120 -->
  <g class="c-purple">
    <rect x="64" y="156" width="120" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="124" y="174" text-anchor="middle" dominant-baseline="central">Caption</text>
    <text class="ts" x="124" y="194" text-anchor="middle" dominant-baseline="central">tokens</text>
  </g>

  <!-- Arrow: Caption → Text encoder -->
  <line x1="184" y1="184" x2="224" y2="184" class="arr" marker-end="url(#arrow)"/>

  <!-- Col 2: Text encoder — x=230, w=160 -->
  <g class="c-purple">
    <rect x="230" y="156" width="160" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="310" y="174" text-anchor="middle" dominant-baseline="central">Text encoder</text>
    <text class="ts" x="310" y="194" text-anchor="middle" dominant-baseline="central">Transformer</text>
  </g>

  <!-- Arrow: Text encoder → Text vector -->
  <line x1="390" y1="184" x2="430" y2="184" class="arr" marker-end="url(#arrow)"/>

  <!-- Col 3: Text vector — x=436, w=152 -->
  <g class="c-purple">
    <rect x="436" y="156" width="152" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="512" y="174" text-anchor="middle" dominant-baseline="central">Text vector</text>
    <text class="ts" x="512" y="194" text-anchor="middle" dominant-baseline="central">512-dim</text>
  </g>

  <!-- Convergence: Cosine similarity (amber) — y=292, h=56 -->
  <!-- Centered under vectors: x=420, w=184 → center=512 -->
  <g class="c-amber">
    <rect x="420" y="280" width="184" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="512" y="298" text-anchor="middle" dominant-baseline="central">Cosine similarity</text>
    <text class="ts" x="512" y="318" text-anchor="middle" dominant-baseline="central">match score</text>
  </g>

  <!-- Arrow: Image vector → Cosine similarity (L-path routing right to avoid text vector) -->
  <path d="M 588 96 L 588 126 L 636 126 L 636 308 L 604 308"
        fill="none" class="arr" marker-end="url(#arrow)"/>

  <!-- Arrow: Text vector → Cosine similarity (straight down) -->
  <line x1="512" y1="212" x2="512" y2="274" class="arr" marker-end="url(#arrow)"/>
</svg>
</body>
</html>
