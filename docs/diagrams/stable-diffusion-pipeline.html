<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stable Diffusion pipeline</title>
<style>
:root {
  --bg-primary: #ffffff;
  --bg-secondary: #f5f5f0;
  --text-primary: #1a1a1a;
  --text-secondary: #6b6b65;
  --text-tertiary: #9c9a92;
  --border-default: rgba(0,0,0,0.15);
  --border-hover: rgba(0,0,0,0.3);
  --font-sans: system-ui, -apple-system, "Segoe UI", sans-serif;

  --purple-50: #EEEDFE; --purple-100: #CECBF6; --purple-200: #AFA9EC;
  --purple-400: #7F77DD; --purple-600: #534AB7; --purple-800: #3C3489; --purple-900: #26215C;

  --blue-50: #E6F1FB; --blue-100: #B5D4F4; --blue-200: #85B7EB;
  --blue-400: #378ADD; --blue-600: #185FA5; --blue-800: #0C447C; --blue-900: #042C53;

  --green-50: #EAF3DE; --green-100: #C0DD97; --green-200: #97C459;
  --green-400: #639922; --green-600: #3B6D11; --green-800: #27500A; --green-900: #173404;

  --gray-50: #F1EFE8; --gray-100: #D3D1C7; --gray-200: #B4B2A9;
  --gray-400: #888780; --gray-600: #5F5E5A; --gray-800: #444441; --gray-900: #2C2C2A;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg-primary: #1a1a1a;
    --bg-secondary: #2c2c2a;
    --text-primary: #e8e6df;
    --text-secondary: #9c9a92;
    --text-tertiary: #6b6b65;
    --border-default: rgba(255,255,255,0.15);
    --border-hover: rgba(255,255,255,0.3);
  }
}

body {
  margin: 0;
  padding: 20px;
  background: var(--bg-primary);
  font-family: var(--font-sans);
}

.t  { font-family: var(--font-sans); font-size: 14px; font-weight: 400; fill: var(--text-primary); }
.ts { font-family: var(--font-sans); font-size: 12px; font-weight: 400; fill: var(--text-secondary); }
.th { font-family: var(--font-sans); font-size: 14px; font-weight: 500; fill: var(--text-primary); }

.box { fill: var(--bg-secondary); stroke: var(--border-default); }
.arr { stroke: var(--text-tertiary); stroke-width: 1.5; }
.node { cursor: pointer; }
.node:hover { opacity: 0.8; }
.node:active { opacity: 0.65; }
.node:focus-visible { outline: 2px solid var(--blue-400); outline-offset: 2px; }

.c-purple > rect { fill: var(--purple-50); stroke: var(--purple-600); }
.c-purple > .th  { fill: var(--purple-800); }
.c-purple > .ts  { fill: var(--purple-600); }
.c-purple > .t   { fill: var(--purple-800); }

.c-blue > rect { fill: var(--blue-50); stroke: var(--blue-600); }
.c-blue > .th  { fill: var(--blue-800); }
.c-blue > .ts  { fill: var(--blue-600); }
.c-blue > .t   { fill: var(--blue-800); }

.c-green > rect { fill: var(--green-50); stroke: var(--green-600); }
.c-green > .th  { fill: var(--green-800); }
.c-green > .ts  { fill: var(--green-600); }
.c-green > .t   { fill: var(--green-800); }

.c-gray > rect { fill: var(--gray-50); stroke: var(--gray-600); }
.c-gray > .th  { fill: var(--gray-800); }
.c-gray > .ts  { fill: var(--gray-600); }
.c-gray > .t   { fill: var(--gray-800); }

@media (prefers-color-scheme: dark) {
  .c-purple > rect { fill: var(--purple-900); stroke: var(--purple-200); }
  .c-purple > .th  { fill: var(--purple-100); }
  .c-purple > .ts  { fill: var(--purple-200); }
  .c-purple > .t   { fill: var(--purple-100); }

  .c-blue > rect { fill: var(--blue-900); stroke: var(--blue-200); }
  .c-blue > .th  { fill: var(--blue-100); }
  .c-blue > .ts  { fill: var(--blue-200); }
  .c-blue > .t   { fill: var(--blue-100); }

  .c-green > rect { fill: var(--green-900); stroke: var(--green-200); }
  .c-green > .th  { fill: var(--green-100); }
  .c-green > .ts  { fill: var(--green-200); }
  .c-green > .t   { fill: var(--green-100); }

  .c-gray > rect { fill: var(--gray-900); stroke: var(--gray-200); }
  .c-gray > .th  { fill: var(--gray-100); }
  .c-gray > .ts  { fill: var(--gray-200); }
  .c-gray > .t   { fill: var(--gray-100); }
}
</style>
</head>
<body>
<!--
  Layout plan (top-to-bottom, left-to-right within groups):

  GROUP 1 — CLIP (purple): y=30, height=120
    Boxes at y=72: Text prompt (x=60,w=130) → Tokenizer (x=234,w=120) → Text encoder (x=408,w=148)
    Group label at y=52

  Connector arrow: Text encoder bottom (482,128) → denoising step top (344,210)
    Route L-shaped: down to y=168, left to x=344, down to y=210
    Label "[77, 768]" at midpoint

  GROUP 2 — Denoising loop (blue): y=174, height=170
    Boxes at y=216: z_T (x=60,w=130) → Per step (x=224,w=240,h=108) → z_0 (x=504,w=120)
    Group label at y=196

  Connector arrow: z_0 bottom (564,272) → Decoder top (340,440)
    Route L-shaped: down to y=400, left to x=340, down to y=440
    Label "[4, 64, 64]" at midpoint

  GROUP 3 — VAE decoder (green): y=384, height=100
    Boxes at y=440: Decoder (x=280,w=120) → Image (x=444,w=128)
    Group label at y=406
-->
<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 524">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
          markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
          stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ========== GROUP 1: CLIP (purple) ========== -->
<!-- Container: y=30, h=120, bottom=150 -->
<rect x="40" y="30" width="600" height="120" rx="16"
      fill="var(--purple-50)" stroke="var(--purple-600)" stroke-width="0.5" opacity="0.35"/>
<text class="th" x="340" y="52" text-anchor="middle" dominant-baseline="central"
      style="fill: var(--purple-600)">CLIP text encoder (frozen, ~123M params)</text>

<!-- Text prompt: x=60, y=72, w=130, h=56 -->
<g class="node c-purple" data-action="emit" data-target="text-prompt">
  <rect x="60" y="72" width="130" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="125" y="92" text-anchor="middle" dominant-baseline="central">Text prompt</text>
  <text class="ts" x="125" y="112" text-anchor="middle" dominant-baseline="central">"a cat on mars"</text>
</g>

<!-- Arrow: Text prompt → Tokenizer -->
<line x1="190" y1="100" x2="228" y2="100" class="arr" marker-end="url(#arrow)"/>

<!-- Tokenizer: x=234, y=78, w=120, h=44 -->
<g class="node c-purple" data-action="emit" data-target="tokenizer">
  <rect x="234" y="78" width="120" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="294" y="100" text-anchor="middle" dominant-baseline="central">Tokenizer</text>
</g>

<!-- Arrow: Tokenizer → Text encoder, label above -->
<line x1="354" y1="100" x2="402" y2="100" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="378" y="88" text-anchor="middle" dominant-baseline="central">[77] int IDs</text>

<!-- Text encoder: x=408, y=72, w=148, h=56 -->
<g class="node c-purple" data-action="emit" data-target="text-encoder">
  <rect x="408" y="72" width="148" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="482" y="92" text-anchor="middle" dominant-baseline="central">Text encoder</text>
  <text class="ts" x="482" y="112" text-anchor="middle" dominant-baseline="central">12 transformer layers</text>
</g>


<!-- ========== Connector: CLIP → Denoising loop ========== -->
<!-- Text encoder bottom center: (482, 128). Target: denoising step box top center (344, 216) -->
<!-- Route: down from (482,128) to (482,168), left to (344,168), down to (344,210) -->
<path d="M 482 128 L 482 168 L 344 168 L 344 210" fill="none"
      stroke="var(--purple-400)" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="420" y="162" text-anchor="middle" dominant-baseline="central"
      style="fill: var(--purple-400)">[77, 768] text embeddings</text>


<!-- ========== GROUP 2: Denoising loop (blue) ========== -->
<!-- Container: y=174, h=170, bottom=344 -->
<rect x="40" y="174" width="600" height="170" rx="16"
      fill="var(--blue-50)" stroke="var(--blue-600)" stroke-width="0.5" opacity="0.35"/>
<text class="th" x="340" y="200" text-anchor="middle" dominant-baseline="central"
      style="fill: var(--blue-600)">Denoising loop -- U-Net (~860M params) x 50 steps</text>

<!-- z_T: x=60, y=218, w=130, h=56 -->
<g class="node c-blue" data-action="emit" data-target="noise-sample">
  <rect x="60" y="218" width="130" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="125" y="238" text-anchor="middle" dominant-baseline="central">z_T ~ N(0,I)</text>
  <text class="ts" x="125" y="258" text-anchor="middle" dominant-baseline="central">[4, 64, 64]</text>
</g>

<!-- Arrow: z_T → Per step -->
<line x1="190" y1="246" x2="218" y2="246" class="arr" marker-end="url(#arrow)"/>

<!-- Per denoising step: x=224, y=216, w=240, h=108 -->
<g class="node c-blue" data-action="emit" data-target="denoising-step">
  <rect x="224" y="216" width="240" height="108" rx="8" stroke-width="0.5"/>
  <text class="th" x="344" y="236" text-anchor="middle" dominant-baseline="central">Per denoising step</text>
  <text class="ts" x="344" y="258" text-anchor="middle" dominant-baseline="central">1. Embed timestep t</text>
  <text class="ts" x="344" y="276" text-anchor="middle" dominant-baseline="central">2. U-Net pass (uncond)</text>
  <text class="ts" x="344" y="294" text-anchor="middle" dominant-baseline="central">3. U-Net pass (cond)</text>
  <text class="ts" x="344" y="312" text-anchor="middle" dominant-baseline="central">4. CFG combine + sched step</text>
</g>

<!-- Arrow: Per step → z_0 -->
<line x1="464" y1="246" x2="498" y2="246" class="arr" marker-end="url(#arrow)"/>

<!-- z_0: x=504, y=218, w=120, h=56 -->
<g class="node c-blue" data-action="emit" data-target="clean-latent">
  <rect x="504" y="218" width="120" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="564" y="238" text-anchor="middle" dominant-baseline="central">z_0</text>
  <text class="ts" x="564" y="258" text-anchor="middle" dominant-baseline="central">[4, 64, 64]</text>
</g>


<!-- ========== Connector: Denoising loop → VAE ========== -->
<!-- z_0 bottom center: (564, 274). Target: Decoder top center (340, 440) -->
<!-- Route: down from (564,274) to (564,384), left to (340,384), down to (340,434) -->
<path d="M 564 274 L 564 384 L 340 384 L 340 434" fill="none"
      stroke="var(--blue-400)" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="576" y="340" dominant-baseline="central"
      style="fill: var(--blue-400)">[4, 64, 64]</text>


<!-- ========== GROUP 3: VAE Decoder (green) ========== -->
<!-- Container: y=394, h=90, bottom=484 -->
<rect x="40" y="394" width="600" height="90" rx="16"
      fill="var(--green-50)" stroke="var(--green-600)" stroke-width="0.5" opacity="0.35"/>
<text class="th" x="340" y="416" text-anchor="middle" dominant-baseline="central"
      style="fill: var(--green-600)">VAE decoder (frozen, ~84M params)</text>

<!-- Decoder: x=280, y=434, w=120, h=44 -->
<g class="node c-green" data-action="emit" data-target="vae-decoder">
  <rect x="280" y="434" width="120" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="456" text-anchor="middle" dominant-baseline="central">Decoder</text>
</g>

<!-- Arrow: Decoder → Image -->
<line x1="400" y1="456" x2="438" y2="456" class="arr" marker-end="url(#arrow)"/>

<!-- Image: x=444, y=434, w=128, h=44 -->
<g class="node c-green" data-action="emit" data-target="output-image">
  <rect x="444" y="428" width="128" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="508" y="448" text-anchor="middle" dominant-baseline="central">Image</text>
  <text class="ts" x="508" y="468" text-anchor="middle" dominant-baseline="central">[3, 512, 512]</text>
</g>

</svg>

<script>
document.querySelectorAll('.node[data-action]').forEach(node => {
  node.setAttribute('tabindex', '0');
  node.setAttribute('role', 'button');
  node.setAttribute('aria-label', node.querySelector('.th')?.textContent || 'Diagram node');

  function handleActivation() {
    const action = node.dataset.action;
    const target = node.dataset.target;
    const label = node.querySelector('.th')?.textContent || '';
    const detail = { action, target, label, node };
    document.dispatchEvent(new CustomEvent('diagram-node-click', { detail }));
    switch (action) {
      case 'navigate':
        if (target) window.location.href = target;
        break;
      case 'open':
        if (target) window.open(target, '_blank');
        break;
      case 'prompt':
        console.log(`[diagram] prompt: "${target || label}"`);
        break;
      case 'emit':
        break;
    }
  }

  node.addEventListener('click', handleActivation);
  node.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleActivation(); }
  });
});
</script>
</body>
</html>
