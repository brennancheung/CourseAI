<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAM Architecture</title>
<style>
  :root {
    --bg-primary: #ffffff;
    --text-tertiary: #9c9a92;
    --font-sans: system-ui, -apple-system, "Segoe UI", sans-serif;

    --blue-50: #E6F1FB; --blue-100: #B5D4F4; --blue-200: #85B7EB;
    --blue-600: #185FA5; --blue-800: #0C447C; --blue-900: #042C53;
    --amber-50: #FAEEDA; --amber-100: #FAC775; --amber-200: #EF9F27;
    --amber-600: #854F0B; --amber-800: #633806; --amber-900: #412402;
    --teal-50: #E1F5EE; --teal-100: #9FE1CB; --teal-200: #5DCAA5;
    --teal-600: #0F6E56; --teal-800: #085041; --teal-900: #04342C;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1a1a1a;
      --text-tertiary: #6b6b65;
    }
  }

  body {
    margin: 0;
    padding: 20px;
    background: var(--bg-primary);
    font-family: var(--font-sans);
  }

  .th { font-family: var(--font-sans); font-size: 14px; font-weight: 500; }
  .ts { font-family: var(--font-sans); font-size: 12px; font-weight: 400; }
  .arr { stroke: var(--text-tertiary); stroke-width: 1.5; }

  .c-blue > rect { fill: var(--blue-50); stroke: var(--blue-600); }
  .c-blue > .th  { fill: var(--blue-800); }
  .c-blue > .ts  { fill: var(--blue-600); }

  .c-amber > rect { fill: var(--amber-50); stroke: var(--amber-600); }
  .c-amber > .th  { fill: var(--amber-800); }
  .c-amber > .ts  { fill: var(--amber-600); }

  .c-teal > rect { fill: var(--teal-50); stroke: var(--teal-600); }
  .c-teal > .th  { fill: var(--teal-800); }
  .c-teal > .ts  { fill: var(--teal-600); }

  @media (prefers-color-scheme: dark) {
    .c-blue > rect { fill: var(--blue-900); stroke: var(--blue-200); }
    .c-blue > .th  { fill: var(--blue-100); }
    .c-blue > .ts  { fill: var(--blue-200); }

    .c-amber > rect { fill: var(--amber-900); stroke: var(--amber-200); }
    .c-amber > .th  { fill: var(--amber-100); }
    .c-amber > .ts  { fill: var(--amber-200); }

    .c-teal > rect { fill: var(--teal-900); stroke: var(--teal-200); }
    .c-teal > .th  { fill: var(--teal-100); }
    .c-teal > .ts  { fill: var(--teal-200); }
  }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 360">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ============================================================
       Row 1 (blue): Image → ViT-H Image Encoder → Image Embedding
       y=40, height=56, center=68
       Boxes: 40..152, 168..376, 392..556
       ============================================================ -->

  <g class="c-blue">
    <rect x="40" y="40" width="112" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="96" y="58" text-anchor="middle" dominant-baseline="central">Image</text>
    <text class="ts" x="96" y="76" text-anchor="middle" dominant-baseline="central">1024x1024x3</text>
  </g>

  <line x1="152" y1="68" x2="162" y2="68" class="arr" marker-end="url(#arrow)"/>

  <g class="c-blue">
    <rect x="168" y="40" width="208" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="272" y="58" text-anchor="middle" dominant-baseline="central">ViT-H Image Encoder</text>
    <text class="ts" x="272" y="76" text-anchor="middle" dominant-baseline="central">~150ms, ONCE</text>
  </g>

  <line x1="376" y1="68" x2="386" y2="68" class="arr" marker-end="url(#arrow)"/>

  <g class="c-blue">
    <rect x="392" y="40" width="164" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="474" y="58" text-anchor="middle" dominant-baseline="central">Image Embedding</text>
    <text class="ts" x="474" y="76" text-anchor="middle" dominant-baseline="central">64x64x256</text>
  </g>

  <!-- ============================================================
       Row 2 (amber): User Prompt → Prompt Encoder → Prompt Tokens
       y=156, height=56, center=184
       Boxes: 40..188, 204..360, 392..556
       ============================================================ -->

  <g class="c-amber">
    <rect x="40" y="156" width="148" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="114" y="174" text-anchor="middle" dominant-baseline="central">User Prompt</text>
    <text class="ts" x="114" y="192" text-anchor="middle" dominant-baseline="central">point/box/text</text>
  </g>

  <line x1="188" y1="184" x2="198" y2="184" class="arr" marker-end="url(#arrow)"/>

  <g class="c-amber">
    <rect x="204" y="156" width="156" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="282" y="174" text-anchor="middle" dominant-baseline="central">Prompt Encoder</text>
    <text class="ts" x="282" y="192" text-anchor="middle" dominant-baseline="central">&lt;1ms</text>
  </g>

  <line x1="360" y1="184" x2="386" y2="184" class="arr" marker-end="url(#arrow)"/>

  <g class="c-amber">
    <rect x="392" y="156" width="164" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="474" y="174" text-anchor="middle" dominant-baseline="central">Prompt Tokens</text>
    <text class="ts" x="474" y="192" text-anchor="middle" dominant-baseline="central">1-4 tokens</text>
  </g>

  <!-- ============================================================
       Convergence: route around right side of column-3 boxes
       Image Embedding right edge = 556, Prompt Tokens right edge = 556
       Route via x=580 (right of both boxes), then down/up to shared
       y=218, then left to Mask Decoder

       Image Embedding (556, 68) → right to (580, 68) → down to (580, 218)
       Prompt Tokens (556, 184) → right to (580, 184) → down to (580, 218)
       Shared (580, 218) → left to Mask Decoder center (340, 218)
       Then down to Mask Decoder top (340, 258)
       ============================================================ -->

  <path d="M 556 68 L 580 68 L 580 218" fill="none" class="arr"/>
  <path d="M 556 184 L 580 184 L 580 218" fill="none" class="arr"/>
  <path d="M 580 218 L 340 218 L 340 252" fill="none" class="arr" marker-end="url(#arrow)"/>

  <!-- ============================================================
       Row 3 (teal): Mask Decoder → 3 Candidate Masks
       y=258, height=56, center=286
       ============================================================ -->

  <g class="c-teal">
    <rect x="243" y="258" width="194" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="276" text-anchor="middle" dominant-baseline="central">Mask Decoder</text>
    <text class="ts" x="340" y="294" text-anchor="middle" dominant-baseline="central">~50ms, PER PROMPT</text>
  </g>

  <line x1="437" y1="286" x2="453" y2="286" class="arr" marker-end="url(#arrow)"/>

  <g class="c-teal">
    <rect x="459" y="258" width="180" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="549" y="276" text-anchor="middle" dominant-baseline="central">3 Candidate Masks</text>
    <text class="ts" x="549" y="294" text-anchor="middle" dominant-baseline="central">+ confidence scores</text>
  </g>
</svg>
</body>
</html>
