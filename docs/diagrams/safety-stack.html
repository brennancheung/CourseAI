<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Safety Stack — Four-Layer Defense</title>
<style>
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f0;
    --text-primary: #1a1a1a;
    --text-secondary: #6b6b65;
    --text-tertiary: #9c9a92;
    --border-default: rgba(0,0,0,0.15);
    --font-sans: system-ui, -apple-system, "Segoe UI", sans-serif;

    --blue-50: #E6F1FB; --blue-100: #B5D4F4; --blue-200: #85B7EB;
    --blue-600: #185FA5; --blue-800: #0C447C; --blue-900: #042C53;
    --amber-50: #FAEEDA; --amber-100: #FAC775; --amber-200: #EF9F27;
    --amber-600: #854F0B; --amber-800: #633806; --amber-900: #412402;
    --purple-50: #EEEDFE; --purple-100: #CECBF6; --purple-200: #AFA9EC;
    --purple-600: #534AB7; --purple-800: #3C3489; --purple-900: #26215C;
    --teal-50: #E1F5EE; --teal-100: #9FE1CB; --teal-200: #5DCAA5;
    --teal-600: #0F6E56; --teal-800: #085041; --teal-900: #04342C;
    --coral-50: #FAECE7; --coral-100: #F5C4B3; --coral-200: #F0997B;
    --coral-600: #993C1D; --coral-800: #712B13; --coral-900: #4A1B0C;
    --green-50: #EAF3DE; --green-100: #C0DD97; --green-200: #97C459;
    --green-600: #3B6D11; --green-800: #27500A; --green-900: #173404;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1a1a1a;
      --bg-secondary: #2c2c2a;
      --text-primary: #e8e6df;
      --text-secondary: #9c9a92;
      --text-tertiary: #6b6b65;
      --border-default: rgba(255,255,255,0.15);
    }
  }

  body {
    margin: 0;
    padding: 20px;
    background: var(--bg-primary);
    font-family: var(--font-sans);
  }

  .t  { font-family: var(--font-sans); font-size: 14px; font-weight: 400; fill: var(--text-primary); }
  .ts { font-family: var(--font-sans); font-size: 12px; font-weight: 400; fill: var(--text-secondary); }
  .th { font-family: var(--font-sans); font-size: 14px; font-weight: 500; fill: var(--text-primary); }
  .arr { stroke: var(--text-tertiary); stroke-width: 1.5; }
  .lbl { fill: var(--text-tertiary); font-family: var(--font-sans); font-size: 12px; font-weight: 400; }

  .c-blue > rect { fill: var(--blue-50); stroke: var(--blue-600); }
  .c-blue > .th  { fill: var(--blue-800); }
  .c-blue > .ts  { fill: var(--blue-600); }

  .c-amber > rect { fill: var(--amber-50); stroke: var(--amber-600); }
  .c-amber > .th  { fill: var(--amber-800); }
  .c-amber > .ts  { fill: var(--amber-600); }

  .c-purple > rect { fill: var(--purple-50); stroke: var(--purple-600); }
  .c-purple > .th  { fill: var(--purple-800); }
  .c-purple > .ts  { fill: var(--purple-600); }

  .c-teal > rect { fill: var(--teal-50); stroke: var(--teal-600); }
  .c-teal > .th  { fill: var(--teal-800); }
  .c-teal > .ts  { fill: var(--teal-600); }

  .c-coral > rect { fill: var(--coral-50); stroke: var(--coral-600); }
  .c-coral > .th  { fill: var(--coral-800); }
  .c-coral > .ts  { fill: var(--coral-600); }

  .c-green > rect { fill: var(--green-50); stroke: var(--green-600); }
  .c-green > .th  { fill: var(--green-800); }

  @media (prefers-color-scheme: dark) {
    .c-blue > rect { fill: var(--blue-900); stroke: var(--blue-200); }
    .c-blue > .th  { fill: var(--blue-100); }
    .c-blue > .ts  { fill: var(--blue-200); }

    .c-amber > rect { fill: var(--amber-900); stroke: var(--amber-200); }
    .c-amber > .th  { fill: var(--amber-100); }
    .c-amber > .ts  { fill: var(--amber-200); }

    .c-purple > rect { fill: var(--purple-900); stroke: var(--purple-200); }
    .c-purple > .th  { fill: var(--purple-100); }
    .c-purple > .ts  { fill: var(--purple-200); }

    .c-teal > rect { fill: var(--teal-900); stroke: var(--teal-200); }
    .c-teal > .th  { fill: var(--teal-100); }
    .c-teal > .ts  { fill: var(--teal-200); }

    .c-coral > rect { fill: var(--coral-900); stroke: var(--coral-200); }
    .c-coral > .th  { fill: var(--coral-100); }
    .c-coral > .ts  { fill: var(--coral-200); }

    .c-green > rect { fill: var(--green-900); stroke: var(--green-200); }
    .c-green > .th  { fill: var(--green-100); }
  }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 576">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <g class="c-blue">
    <rect x="270" y="40" width="140" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="62" text-anchor="middle" dominant-baseline="central">User prompt</text>
  </g>

  <line x1="340" y1="84" x2="340" y2="142" class="arr" marker-end="url(#arrow)"/>

  <g class="c-amber">
    <rect x="252" y="144" width="176" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="162" text-anchor="middle" dominant-baseline="central">Prompt filtering</text>
    <text class="ts" x="340" y="180" text-anchor="middle" dominant-baseline="central">Layer 1</text>
  </g>

  <line x1="428" y1="172" x2="486" y2="172" class="arr" marker-end="url(#arrow)"/>
  <text class="lbl" x="457" y="158" text-anchor="middle" dominant-baseline="central">blocked</text>

  <g class="c-coral">
    <rect x="488" y="150" width="110" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="543" y="172" text-anchor="middle" dominant-baseline="central">Blocked</text>
  </g>

  <line x1="340" y1="200" x2="340" y2="258" class="arr" marker-end="url(#arrow)"/>
  <text class="lbl" x="356" y="230" text-anchor="start" dominant-baseline="central">pass</text>

  <g class="c-coral">
    <rect x="42" y="260" width="152" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="118" y="278" text-anchor="middle" dominant-baseline="central">Model erasure</text>
    <text class="ts" x="118" y="296" text-anchor="middle" dominant-baseline="central">Layer 4</text>
  </g>

  <line x1="194" y1="288" x2="242" y2="288" class="arr" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text class="lbl" x="218" y="250" text-anchor="middle" dominant-baseline="central">modifies weights</text>

  <g class="c-purple">
    <rect x="244" y="260" width="192" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="278" text-anchor="middle" dominant-baseline="central">Inference guidance</text>
    <text class="ts" x="340" y="296" text-anchor="middle" dominant-baseline="central">Layer 2 · SLD</text>
  </g>

  <line x1="340" y1="316" x2="340" y2="374" class="arr" marker-end="url(#arrow)"/>

  <g class="c-teal">
    <rect x="246" y="376" width="188" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="394" text-anchor="middle" dominant-baseline="central">Output classifier</text>
    <text class="ts" x="340" y="412" text-anchor="middle" dominant-baseline="central">Layer 3</text>
  </g>

  <line x1="434" y1="404" x2="486" y2="404" class="arr" marker-end="url(#arrow)"/>
  <text class="lbl" x="460" y="390" text-anchor="middle" dominant-baseline="central">blocked</text>

  <g class="c-coral">
    <rect x="488" y="382" width="110" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="543" y="404" text-anchor="middle" dominant-baseline="central">Blocked</text>
  </g>

  <line x1="340" y1="432" x2="340" y2="490" class="arr" marker-end="url(#arrow)"/>
  <text class="lbl" x="356" y="462" text-anchor="start" dominant-baseline="central">pass</text>

  <g class="c-green">
    <rect x="278" y="492" width="124" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="514" text-anchor="middle" dominant-baseline="central">Delivered</text>
  </g>
</svg>
</body>
</html>
