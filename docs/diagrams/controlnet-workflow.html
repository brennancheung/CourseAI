<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ControlNet end-to-end workflow</title>
<style>
:root {
  --bg-primary: #ffffff;
  --bg-secondary: #f5f5f0;
  --text-primary: #1a1a1a;
  --text-secondary: #6b6b65;
  --text-tertiary: #9c9a92;
  --border-default: rgba(0,0,0,0.15);
  --border-hover: rgba(0,0,0,0.3);
  --font-sans: system-ui, -apple-system, "Segoe UI", sans-serif;

  --purple-50: #EEEDFE; --purple-100: #CECBF6; --purple-200: #AFA9EC;
  --purple-400: #7F77DD; --purple-600: #534AB7; --purple-800: #3C3489; --purple-900: #26215C;
  --teal-50: #E1F5EE; --teal-100: #9FE1CB; --teal-200: #5DCAA5;
  --teal-400: #1D9E75; --teal-600: #0F6E56; --teal-800: #085041; --teal-900: #04342C;
  --coral-50: #FAECE7; --coral-100: #F5C4B3; --coral-200: #F0997B;
  --coral-400: #D85A30; --coral-600: #993C1D; --coral-800: #712B13; --coral-900: #4A1B0C;
  --gray-50: #F1EFE8; --gray-100: #D3D1C7; --gray-200: #B4B2A9;
  --gray-400: #888780; --gray-600: #5F5E5A; --gray-800: #444441; --gray-900: #2C2C2A;
  --blue-50: #E6F1FB; --blue-100: #B5D4F4; --blue-200: #85B7EB;
  --blue-400: #378ADD; --blue-600: #185FA5; --blue-800: #0C447C; --blue-900: #042C53;
  --amber-50: #FAEEDA; --amber-100: #FAC775; --amber-200: #EF9F27;
  --amber-400: #BA7517; --amber-600: #854F0B; --amber-800: #633806; --amber-900: #412402;
  --green-50: #EAF3DE; --green-100: #C0DD97; --green-200: #97C459;
  --green-400: #639922; --green-600: #3B6D11; --green-800: #27500A; --green-900: #173404;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg-primary: #1a1a1a;
    --bg-secondary: #2c2c2a;
    --text-primary: #e8e6df;
    --text-secondary: #9c9a92;
    --text-tertiary: #6b6b65;
    --border-default: rgba(255,255,255,0.15);
    --border-hover: rgba(255,255,255,0.3);
  }
}

body {
  margin: 0;
  padding: 20px;
  background: var(--bg-primary);
  font-family: var(--font-sans);
}

.t  { font-family: var(--font-sans); font-size: 14px; font-weight: 400; fill: var(--text-primary); }
.ts { font-family: var(--font-sans); font-size: 12px; font-weight: 400; fill: var(--text-secondary); }
.th { font-family: var(--font-sans); font-size: 14px; font-weight: 500; fill: var(--text-primary); }

.box { fill: var(--bg-secondary); stroke: var(--border-default); }

.arr { stroke: var(--text-tertiary); stroke-width: 1.5; }

.node { cursor: pointer; }
.node:hover { opacity: 0.8; }
.node:active { opacity: 0.65; }
.node:focus-visible { outline: 2px solid var(--blue-400); outline-offset: 2px; }

.c-purple > rect { fill: var(--purple-50); stroke: var(--purple-600); }
.c-purple > .th  { fill: var(--purple-800); }
.c-purple > .ts  { fill: var(--purple-600); }
.c-purple > .t   { fill: var(--purple-800); }

.c-coral > rect { fill: var(--coral-50); stroke: var(--coral-600); }
.c-coral > .th  { fill: var(--coral-800); }
.c-coral > .ts  { fill: var(--coral-600); }
.c-coral > .t   { fill: var(--coral-800); }

.c-gray > rect { fill: var(--gray-50); stroke: var(--gray-600); }
.c-gray > .th  { fill: var(--gray-800); }
.c-gray > .ts  { fill: var(--gray-600); }
.c-gray > .t   { fill: var(--gray-800); }

.c-blue > rect { fill: var(--blue-50); stroke: var(--blue-600); }
.c-blue > .th  { fill: var(--blue-800); }
.c-blue > .ts  { fill: var(--blue-600); }
.c-blue > .t   { fill: var(--blue-800); }

.c-amber > rect { fill: var(--amber-50); stroke: var(--amber-600); }
.c-amber > .th  { fill: var(--amber-800); }
.c-amber > .ts  { fill: var(--amber-600); }
.c-amber > .t   { fill: var(--amber-800); }

.c-green > rect { fill: var(--green-50); stroke: var(--green-600); }
.c-green > .th  { fill: var(--green-800); }
.c-green > .ts  { fill: var(--green-600); }
.c-green > .t   { fill: var(--green-800); }

@media (prefers-color-scheme: dark) {
  .c-purple > rect { fill: var(--purple-900); stroke: var(--purple-200); }
  .c-purple > .th  { fill: var(--purple-100); }
  .c-purple > .ts  { fill: var(--purple-200); }
  .c-purple > .t   { fill: var(--purple-100); }

  .c-coral > rect { fill: var(--coral-900); stroke: var(--coral-200); }
  .c-coral > .th  { fill: var(--coral-100); }
  .c-coral > .ts  { fill: var(--coral-200); }
  .c-coral > .t   { fill: var(--coral-100); }

  .c-gray > rect { fill: var(--gray-900); stroke: var(--gray-200); }
  .c-gray > .th  { fill: var(--gray-100); }
  .c-gray > .ts  { fill: var(--gray-200); }
  .c-gray > .t   { fill: var(--gray-100); }

  .c-blue > rect { fill: var(--blue-900); stroke: var(--blue-200); }
  .c-blue > .th  { fill: var(--blue-100); }
  .c-blue > .ts  { fill: var(--blue-200); }
  .c-blue > .t   { fill: var(--blue-100); }

  .c-amber > rect { fill: var(--amber-900); stroke: var(--amber-200); }
  .c-amber > .th  { fill: var(--amber-100); }
  .c-amber > .ts  { fill: var(--amber-200); }
  .c-amber > .t   { fill: var(--amber-100); }

  .c-green > rect { fill: var(--green-900); stroke: var(--green-200); }
  .c-green > .th  { fill: var(--green-100); }
  .c-green > .ts  { fill: var(--green-200); }
  .c-green > .t   { fill: var(--green-100); }
}
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 244">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
          markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
          stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!--
  Layout plan:
  Row 1 (y=40): Photograph -> Preprocessor -> Spatial map -> ControlNet
  Row 2 (y=160): Text prompt ─────────────────> SD pipeline -> Generated image
  ControlNet connects down to SD pipeline via L-bend arrow.
  Text prompt connects right to SD pipeline.

  Row 1 boxes (all height=44):
    Photograph:    x=40,  w=100  (10 chars * 8 + 48 = 128, use 108 rounding down ok, "Photograph"=10*8=80+48=128→use 108 ok tight, let's use 110)
    Preprocessor:  x=170, w=120  (12 chars * 8 + 48 = 144→use 126)
    Spatial map:   x=316, w=110  (11 chars * 8 + 48 = 136→use 114)
    ControlNet:    x=452, w=110  (10 chars * 8 + 48 = 128→use 114)

  Recalc with actual fit. Safe area 40-640 = 600px.
  4 boxes: let's use w=120 each, gap=30 between.
  Total: 4*120 + 3*30 = 480+90 = 570. Fits.
    Box1: x=70,  w=120  center=130
    Box2: x=220, w=120  center=280
    Box3: x=370, w=120  center=430
    Box4: x=520, w=120  center=580

  Row 2 boxes (y=160, height=44):
    Text prompt:   x=70,  w=120  center=130
    SD pipeline:   x=310, w=210  (25 chars "Stable Diffusion pipeline" * 8 + 48 = 248→use 210, text is ~200px at 8px/char for 25 chars)
    Generated image: x=540  Doesn't fit at w=152 (540+152=692>640).

  Let me re-layout row 2 to fit:
    Text prompt:   x=40,  w=120  center=100
    SD pipeline:   x=220, w=220  center=330
    Gen image:     x=480, w=160  center=560
    Check: 480+160=640. Exactly at boundary. Good.

  Revise row 1 to align ControlNet output with SD pipeline input:
    Photograph:    x=40,  w=110  center=95
    Preprocessor:  x=172, w=118  center=231
    Spatial map:   x=312, w=110  center=367
    ControlNet:    x=444, w=110  center=499
    Check: 444+110=554 ≤ 640. Good.

  Arrows row 1 (horizontal, y=62 center of h=44 boxes at y=40):
    Photo->Preproc:    x1=150, x2=172  (40+110=150 right edge → 172 left edge)
    Preproc->Spatial:  x1=290, x2=312
    Spatial->CN:       x1=422, x2=444

  Arrow ControlNet → SD pipeline (L-bend):
    From ControlNet bottom center (499, 84) down to SD pipeline top (330, 160).
    L-bend: (499,84) → (499,122) → (330,122) → (330,160)

  Arrow Text prompt → SD pipeline:
    From right edge of Text prompt (160, 182) → left edge SD pipeline (220, 182).

  Arrow SD pipeline → Generated image:
    From right edge (440, 182) → left edge (480, 182).
-->

<!-- === Row 1: Photograph → Preprocessor → Spatial map → ControlNet === -->

<g class="node c-blue" data-action="emit" data-target="photograph">
  <rect x="40" y="40" width="110" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="95" y="62" text-anchor="middle" dominant-baseline="central">Photograph</text>
</g>

<g class="node c-purple" data-action="emit" data-target="preprocessor">
  <rect x="172" y="40" width="118" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="231" y="62" text-anchor="middle" dominant-baseline="central">Preprocessor</text>
</g>

<g class="node c-amber" data-action="emit" data-target="spatial-map">
  <rect x="312" y="40" width="110" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="367" y="62" text-anchor="middle" dominant-baseline="central">Spatial map</text>
</g>

<g class="node c-green" data-action="emit" data-target="controlnet">
  <rect x="444" y="40" width="110" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="499" y="62" text-anchor="middle" dominant-baseline="central">ControlNet</text>
</g>

<!-- Row 1 arrows -->
<line x1="150" y1="62" x2="162" y2="62" class="arr" marker-end="url(#arrow)"/>
<line x1="290" y1="62" x2="302" y2="62" class="arr" marker-end="url(#arrow)"/>
<line x1="422" y1="62" x2="434" y2="62" class="arr" marker-end="url(#arrow)"/>

<!-- === Row 2: Text prompt → SD pipeline → Generated image === -->

<g class="node c-blue" data-action="emit" data-target="text-prompt">
  <rect x="40" y="160" width="120" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="100" y="182" text-anchor="middle" dominant-baseline="central">Text prompt</text>
</g>

<g class="node c-gray" data-action="emit" data-target="sd-pipeline">
  <rect x="220" y="160" width="220" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="330" y="182" text-anchor="middle" dominant-baseline="central">Stable Diffusion pipeline</text>
</g>

<g class="node c-coral" data-action="emit" data-target="generated-image">
  <rect x="480" y="160" width="160" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="560" y="182" text-anchor="middle" dominant-baseline="central">Generated image</text>
</g>

<!-- ControlNet → SD pipeline (L-bend: down then left then down) -->
<path d="M499 84 L499 122 L330 122 L330 150" fill="none" class="arr" marker-end="url(#arrow)"/>

<!-- Text prompt → SD pipeline -->
<line x1="160" y1="182" x2="210" y2="182" class="arr" marker-end="url(#arrow)"/>

<!-- SD pipeline → Generated image -->
<line x1="440" y1="182" x2="470" y2="182" class="arr" marker-end="url(#arrow)"/>

</svg>
<script>
document.querySelectorAll('.node[data-action]').forEach(node => {
  node.setAttribute('tabindex', '0');
  node.setAttribute('role', 'button');
  node.setAttribute('aria-label', node.querySelector('.th')?.textContent || 'Diagram node');

  function handleActivation() {
    const action = node.dataset.action;
    const target = node.dataset.target;
    const label = node.querySelector('.th')?.textContent || '';
    const detail = { action, target, label, node };
    document.dispatchEvent(new CustomEvent('diagram-node-click', { detail }));

    switch (action) {
      case 'navigate':
        if (target) window.location.href = target;
        break;
      case 'open':
        if (target) window.open(target, '_blank');
        break;
      case 'prompt':
        console.log(`[diagram] prompt: "${target || label}"`);
        break;
      case 'emit':
        break;
    }
  }

  node.addEventListener('click', handleActivation);
  node.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleActivation(); }
  });
});
</script>
</body>
</html>
