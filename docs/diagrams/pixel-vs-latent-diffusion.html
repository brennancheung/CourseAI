<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel vs latent diffusion comparison</title>
<style>
:root {
  --bg-primary: #ffffff;
  --bg-secondary: #f5f5f0;
  --text-primary: #1a1a1a;
  --text-secondary: #6b6b65;
  --text-tertiary: #9c9a92;
  --border-default: rgba(0,0,0,0.15);
  --border-hover: rgba(0,0,0,0.3);
  --font-sans: system-ui, -apple-system, "Segoe UI", sans-serif;

  --purple-50: #EEEDFE; --purple-100: #CECBF6; --purple-200: #AFA9EC;
  --purple-400: #7F77DD; --purple-600: #534AB7; --purple-800: #3C3489; --purple-900: #26215C;
  --teal-50: #E1F5EE; --teal-100: #9FE1CB; --teal-200: #5DCAA5;
  --teal-400: #1D9E75; --teal-600: #0F6E56; --teal-800: #085041; --teal-900: #04342C;
  --amber-50: #FAEEDA; --amber-100: #FAC775; --amber-200: #EF9F27;
  --amber-400: #BA7517; --amber-600: #854F0B; --amber-800: #633806; --amber-900: #412402;
  --green-50: #EAF3DE; --green-100: #C0DD97; --green-200: #97C459;
  --green-400: #639922; --green-600: #3B6D11; --green-800: #27500A; --green-900: #173404;
  --gray-50: #F1EFE8; --gray-100: #D3D1C7; --gray-200: #B4B2A9;
  --gray-400: #888780; --gray-600: #5F5E5A; --gray-800: #444441; --gray-900: #2C2C2A;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg-primary: #1a1a1a;
    --bg-secondary: #2c2c2a;
    --text-primary: #e8e6df;
    --text-secondary: #9c9a92;
    --text-tertiary: #6b6b65;
    --border-default: rgba(255,255,255,0.15);
    --border-hover: rgba(255,255,255,0.3);
  }
}

body {
  margin: 0;
  padding: 20px;
  background: var(--bg-primary);
  font-family: var(--font-sans);
}

.t  { font-family: var(--font-sans); font-size: 14px; font-weight: 400; fill: var(--text-primary); }
.ts { font-family: var(--font-sans); font-size: 12px; font-weight: 400; fill: var(--text-secondary); }
.th { font-family: var(--font-sans); font-size: 14px; font-weight: 500; fill: var(--text-primary); }

.box { fill: var(--bg-secondary); stroke: var(--border-default); }
.arr { stroke: var(--text-tertiary); stroke-width: 1.5; }

.c-amber > rect { fill: var(--amber-50); stroke: var(--amber-600); }
.c-amber > .th  { fill: var(--amber-800); }
.c-amber > .ts  { fill: var(--amber-600); }
.c-amber > .t   { fill: var(--amber-800); }

.c-purple > rect { fill: var(--purple-50); stroke: var(--purple-600); }
.c-purple > .th  { fill: var(--purple-800); }
.c-purple > .ts  { fill: var(--purple-600); }
.c-purple > .t   { fill: var(--purple-800); }

.c-green > rect { fill: var(--green-50); stroke: var(--green-600); }
.c-green > .th  { fill: var(--green-800); }
.c-green > .ts  { fill: var(--green-600); }
.c-green > .t   { fill: var(--green-800); }

@media (prefers-color-scheme: dark) {
  .c-amber > rect { fill: var(--amber-900); stroke: var(--amber-200); }
  .c-amber > .th  { fill: var(--amber-100); }
  .c-amber > .ts  { fill: var(--amber-200); }
  .c-amber > .t   { fill: var(--amber-100); }

  .c-purple > rect { fill: var(--purple-900); stroke: var(--purple-200); }
  .c-purple > .th  { fill: var(--purple-100); }
  .c-purple > .ts  { fill: var(--purple-200); }
  .c-purple > .t   { fill: var(--purple-100); }

  .c-green > rect { fill: var(--green-900); stroke: var(--green-200); }
  .c-green > .th  { fill: var(--green-100); }
  .c-green > .ts  { fill: var(--green-200); }
  .c-green > .t   { fill: var(--green-100); }
}
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 396">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
          markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
          stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ===== Row 1 label: Pixel-space diffusion ===== -->
<text class="th" x="340" y="30" text-anchor="middle" dominant-baseline="central"
      style="fill: var(--amber-600)">Pixel-space diffusion</text>

<!-- Row 1: 3 amber boxes, y=48, height=56 -->
<!-- B1: Image 512x512x3 — x=82, w=112 -->
<g class="c-amber">
  <rect x="82" y="48" width="112" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="138" y="68" text-anchor="middle" dominant-baseline="central">Image</text>
  <text class="ts" x="138" y="88" text-anchor="middle" dominant-baseline="central">512×512×3</text>
</g>

<!-- Arrow B1 → B2 -->
<line x1="194" y1="76" x2="224" y2="76" class="arr" marker-end="url(#arrow)"/>

<!-- B2: U-Net denoise ×50 steps — x=234, w=156 -->
<g class="c-amber">
  <rect x="234" y="48" width="156" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="312" y="68" text-anchor="middle" dominant-baseline="central">U-Net denoise</text>
  <text class="ts" x="312" y="88" text-anchor="middle" dominant-baseline="central">×50 steps</text>
</g>

<!-- Arrow B2 → B3 -->
<line x1="390" y1="76" x2="420" y2="76" class="arr" marker-end="url(#arrow)"/>

<!-- B3: Generated image 512×512×3 — x=430, w=168 -->
<g class="c-amber">
  <rect x="430" y="48" width="168" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="514" y="68" text-anchor="middle" dominant-baseline="central">Generated image</text>
  <text class="ts" x="514" y="88" text-anchor="middle" dominant-baseline="central">512×512×3</text>
</g>

<!-- ===== Row 2 label: Latent-space diffusion ===== -->
<text class="th" x="340" y="144" text-anchor="middle" dominant-baseline="central"
      style="fill: var(--purple-600)">Latent-space diffusion</text>

<!-- Row 2: 4 boxes, y=162, height=56 -->
<!-- B4: Image 512×512×3 — x=40, w=104 -->
<g class="c-purple">
  <rect x="40" y="162" width="104" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="92" y="182" text-anchor="middle" dominant-baseline="central">Image</text>
  <text class="ts" x="92" y="202" text-anchor="middle" dominant-baseline="central">512×512×3</text>
</g>

<!-- Arrow B4 → B5 -->
<line x1="144" y1="190" x2="170" y2="190" class="arr" marker-end="url(#arrow)"/>

<!-- B5: VAE encode — x=180, w=112 (green) -->
<g class="c-green">
  <rect x="180" y="162" width="112" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="236" y="182" text-anchor="middle" dominant-baseline="central">VAE encode</text>
  <text class="ts" x="236" y="202" text-anchor="middle" dominant-baseline="central">compress</text>
</g>

<!-- Arrow B5 → B6 -->
<line x1="292" y1="190" x2="318" y2="190" class="arr" marker-end="url(#arrow)"/>

<!-- B6: Latent 64×64×4 — x=328, w=104 -->
<g class="c-purple">
  <rect x="328" y="162" width="104" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="380" y="182" text-anchor="middle" dominant-baseline="central">Latent</text>
  <text class="ts" x="380" y="202" text-anchor="middle" dominant-baseline="central">64×64×4</text>
</g>

<!-- Arrow B6 → B7 -->
<line x1="432" y1="190" x2="462" y2="190" class="arr" marker-end="url(#arrow)"/>

<!-- B7: U-Net denoise ×50 steps — x=472, w=168 -->
<g class="c-purple">
  <rect x="472" y="162" width="168" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="556" y="182" text-anchor="middle" dominant-baseline="central">U-Net denoise</text>
  <text class="ts" x="556" y="202" text-anchor="middle" dominant-baseline="central">×50 steps</text>
</g>

<!-- L-shaped arrow B7 → B8: down from B7 bottom center, left, then down to B8 top -->
<path d="M 556 218 L 556 248 L 252 248 L 252 278" fill="none" class="arr" marker-end="url(#arrow)"/>

<!-- Row 3: 3 boxes, y=288, height=56 -->
<!-- B8: Denoised latent 64×64×4 — x=176, w=152 -->
<g class="c-purple">
  <rect x="176" y="288" width="152" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="252" y="308" text-anchor="middle" dominant-baseline="central">Denoised latent</text>
  <text class="ts" x="252" y="328" text-anchor="middle" dominant-baseline="central">64×64×4</text>
</g>

<!-- Arrow B8 → B9 -->
<line x1="328" y1="316" x2="358" y2="316" class="arr" marker-end="url(#arrow)"/>

<!-- B9: VAE decode — x=368, w=112 (green) -->
<g class="c-green">
  <rect x="368" y="288" width="112" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="424" y="308" text-anchor="middle" dominant-baseline="central">VAE decode</text>
  <text class="ts" x="424" y="328" text-anchor="middle" dominant-baseline="central">decompress</text>
</g>

<!-- Arrow B9 → B10 -->
<line x1="480" y1="316" x2="510" y2="316" class="arr" marker-end="url(#arrow)"/>

<!-- B10: Generated image 512×512×3 — x=520, w=120 -->
<g class="c-purple">
  <rect x="520" y="288" width="120" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="580" y="308" text-anchor="middle" dominant-baseline="central">Generated</text>
  <text class="ts" x="580" y="328" text-anchor="middle" dominant-baseline="central">512×512×3</text>
</g>

</svg>
</body>
</html>
