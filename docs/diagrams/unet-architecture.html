<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>U-Net encoder-decoder with skip connections</title>
<style>
:root {
  --bg-primary: #ffffff;
  --bg-secondary: #f5f5f0;
  --text-primary: #1a1a1a;
  --text-secondary: #6b6b65;
  --text-tertiary: #9c9a92;
  --border-default: rgba(0,0,0,0.15);
  --border-hover: rgba(0,0,0,0.3);
  --font-sans: system-ui, -apple-system, "Segoe UI", sans-serif;

  --purple-50: #EEEDFE; --purple-100: #CECBF6; --purple-200: #AFA9EC;
  --purple-400: #7F77DD; --purple-600: #534AB7; --purple-800: #3C3489; --purple-900: #26215C;
  --teal-50: #E1F5EE; --teal-100: #9FE1CB; --teal-200: #5DCAA5;
  --teal-400: #1D9E75; --teal-600: #0F6E56; --teal-800: #085041; --teal-900: #04342C;
  --blue-50: #E6F1FB; --blue-100: #B5D4F4; --blue-200: #85B7EB;
  --blue-400: #378ADD; --blue-600: #185FA5; --blue-800: #0C447C; --blue-900: #042C53;
  --amber-50: #FAEEDA; --amber-100: #FAC775; --amber-200: #EF9F27;
  --amber-400: #BA7517; --amber-600: #854F0B; --amber-800: #633806; --amber-900: #412402;
  --gray-50: #F1EFE8; --gray-100: #D3D1C7; --gray-200: #B4B2A9;
  --gray-400: #888780; --gray-600: #5F5E5A; --gray-800: #444441; --gray-900: #2C2C2A;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg-primary: #1a1a1a;
    --bg-secondary: #2c2c2a;
    --text-primary: #e8e6df;
    --text-secondary: #9c9a92;
    --text-tertiary: #6b6b65;
    --border-default: rgba(255,255,255,0.15);
    --border-hover: rgba(255,255,255,0.3);
  }
}

body {
  margin: 0;
  padding: 20px;
  background: var(--bg-primary);
  font-family: var(--font-sans);
}

.t  { font-family: var(--font-sans); font-size: 14px; font-weight: 400; fill: var(--text-primary); }
.ts { font-family: var(--font-sans); font-size: 12px; font-weight: 400; fill: var(--text-secondary); }
.th { font-family: var(--font-sans); font-size: 14px; font-weight: 500; fill: var(--text-primary); }

.box { fill: var(--bg-secondary); stroke: var(--border-default); }
.arr { stroke: var(--text-tertiary); stroke-width: 1.5; }

.c-teal > rect { fill: var(--teal-50); stroke: var(--teal-600); }
.c-teal > .th  { fill: var(--teal-800); }
.c-teal > .ts  { fill: var(--teal-600); }

.c-purple > rect { fill: var(--purple-50); stroke: var(--purple-600); }
.c-purple > .th  { fill: var(--purple-800); }
.c-purple > .ts  { fill: var(--purple-600); }

.c-amber > rect { fill: var(--amber-50); stroke: var(--amber-600); }
.c-amber > .th  { fill: var(--amber-800); }
.c-amber > .ts  { fill: var(--amber-600); }

.c-blue > rect { fill: var(--blue-50); stroke: var(--blue-600); }
.c-blue > .th  { fill: var(--blue-800); }
.c-blue > .ts  { fill: var(--blue-600); }

@media (prefers-color-scheme: dark) {
  .c-teal > rect { fill: var(--teal-900); stroke: var(--teal-200); }
  .c-teal > .th  { fill: var(--teal-100); }
  .c-teal > .ts  { fill: var(--teal-200); }

  .c-purple > rect { fill: var(--purple-900); stroke: var(--purple-200); }
  .c-purple > .th  { fill: var(--purple-100); }
  .c-purple > .ts  { fill: var(--purple-200); }

  .c-amber > rect { fill: var(--amber-900); stroke: var(--amber-200); }
  .c-amber > .th  { fill: var(--amber-100); }
  .c-amber > .ts  { fill: var(--amber-200); }

  .c-blue > rect { fill: var(--blue-900); stroke: var(--blue-200); }
  .c-blue > .th  { fill: var(--blue-100); }
  .c-blue > .ts  { fill: var(--blue-200); }
}
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 500">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
          markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
          stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-skip" viewBox="0 0 10 10" refX="8" refY="5"
          markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
          stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ===== Input ===== -->
<g class="c-blue">
  <rect x="70" y="40" width="200" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="170" y="60" text-anchor="middle" dominant-baseline="central">64x64x3</text>
  <text class="ts" x="170" y="80" text-anchor="middle" dominant-baseline="central">Noisy image</text>
</g>

<!-- ===== Encoder column (left, teal) ===== -->
<g class="c-teal">
  <rect x="70" y="120" width="200" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="170" y="140" text-anchor="middle" dominant-baseline="central">64x64x64</text>
  <text class="ts" x="170" y="160" text-anchor="middle" dominant-baseline="central">Edges, textures</text>
</g>

<g class="c-teal">
  <rect x="70" y="216" width="200" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="170" y="236" text-anchor="middle" dominant-baseline="central">32x32x128</text>
  <text class="ts" x="170" y="256" text-anchor="middle" dominant-baseline="central">Shapes, parts</text>
</g>

<g class="c-teal">
  <rect x="70" y="312" width="200" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="170" y="332" text-anchor="middle" dominant-baseline="central">16x16x256</text>
  <text class="ts" x="170" y="352" text-anchor="middle" dominant-baseline="central">Object structure</text>
</g>

<!-- ===== Bottleneck (center, amber) ===== -->
<g class="c-amber">
  <rect x="240" y="404" width="200" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="424" text-anchor="middle" dominant-baseline="central">8x8x512</text>
  <text class="ts" x="340" y="444" text-anchor="middle" dominant-baseline="central">Global context</text>
</g>

<!-- ===== Decoder column (right, purple) ===== -->
<g class="c-purple">
  <rect x="410" y="312" width="200" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="510" y="332" text-anchor="middle" dominant-baseline="central">16x16x256</text>
  <text class="ts" x="510" y="352" text-anchor="middle" dominant-baseline="central">+ encoder features</text>
</g>

<g class="c-purple">
  <rect x="410" y="216" width="200" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="510" y="236" text-anchor="middle" dominant-baseline="central">32x32x128</text>
  <text class="ts" x="510" y="256" text-anchor="middle" dominant-baseline="central">+ encoder features</text>
</g>

<g class="c-purple">
  <rect x="410" y="120" width="200" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="510" y="140" text-anchor="middle" dominant-baseline="central">64x64x64</text>
  <text class="ts" x="510" y="160" text-anchor="middle" dominant-baseline="central">+ encoder features</text>
</g>

<!-- ===== Output ===== -->
<g class="c-blue">
  <rect x="410" y="40" width="200" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="510" y="60" text-anchor="middle" dominant-baseline="central">64x64x3</text>
  <text class="ts" x="510" y="80" text-anchor="middle" dominant-baseline="central">Predicted noise</text>
</g>

<!-- ===== Encoder arrows (downward, left column) ===== -->
<line x1="170" y1="96" x2="170" y2="120" class="arr" marker-end="url(#arrow)"/>

<line x1="170" y1="176" x2="170" y2="216" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="158" y="198" text-anchor="end" dominant-baseline="central">downsample</text>

<line x1="170" y1="272" x2="170" y2="312" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="158" y="294" text-anchor="end" dominant-baseline="central">downsample</text>

<!-- Enc2 to bottleneck (L-bend: down then right) -->
<path d="M170,368 L170,388 L340,388 L340,404" fill="none" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="248" y="383" text-anchor="middle" dominant-baseline="auto">downsample</text>

<!-- ===== Decoder arrows (upward, right column) ===== -->
<!-- Bottleneck to Dec2 (L-bend: right then up) -->
<path d="M340,404 L340,388 L510,388 L510,368" fill="none" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="432" y="383" text-anchor="middle" dominant-baseline="auto">upsample</text>

<line x1="510" y1="312" x2="510" y2="272" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="522" y="294" dominant-baseline="central">upsample</text>

<line x1="510" y1="216" x2="510" y2="176" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="522" y="198" dominant-baseline="central">upsample</text>

<line x1="510" y1="120" x2="510" y2="96" class="arr" marker-end="url(#arrow)"/>

<!-- ===== Skip connections (horizontal dashed) ===== -->
<line x1="270" y1="148" x2="410" y2="148" stroke="var(--text-tertiary)" stroke-width="1.2" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="138" text-anchor="middle" dominant-baseline="auto">skip: concat</text>

<line x1="270" y1="244" x2="410" y2="244" stroke="var(--text-tertiary)" stroke-width="1.2" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="234" text-anchor="middle" dominant-baseline="auto">skip: concat</text>

<line x1="270" y1="340" x2="410" y2="340" stroke="var(--text-tertiary)" stroke-width="1.2" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="330" text-anchor="middle" dominant-baseline="auto">skip: concat</text>

<!-- ===== Group labels ===== -->
<text class="ts" x="170" y="114" text-anchor="middle" opacity="0.5" dominant-baseline="auto">Encoder</text>
<text class="ts" x="510" y="114" text-anchor="middle" opacity="0.5" dominant-baseline="auto">Decoder</text>
<text class="ts" x="340" y="398" text-anchor="middle" opacity="0.5" dominant-baseline="auto">Bottleneck</text>

</svg>
</body>
</html>
