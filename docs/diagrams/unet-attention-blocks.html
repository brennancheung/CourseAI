<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>U-Net attention block sequence</title>
<style>
:root {
  --bg-primary: #ffffff;
  --bg-secondary: #f5f5f0;
  --text-primary: #1a1a1a;
  --text-secondary: #6b6b65;
  --text-tertiary: #9c9a92;
  --border-default: rgba(0,0,0,0.15);
  --border-hover: rgba(0,0,0,0.3);
  --font-sans: system-ui, -apple-system, "Segoe UI", sans-serif;

  --purple-50: #EEEDFE; --purple-100: #CECBF6; --purple-200: #AFA9EC;
  --purple-400: #7F77DD; --purple-600: #534AB7; --purple-800: #3C3489; --purple-900: #26215C;
  --blue-50: #E6F1FB; --blue-100: #B5D4F4; --blue-200: #85B7EB;
  --blue-400: #378ADD; --blue-600: #185FA5; --blue-800: #0C447C; --blue-900: #042C53;
  --amber-50: #FAEEDA; --amber-100: #FAC775; --amber-200: #EF9F27;
  --amber-400: #BA7517; --amber-600: #854F0B; --amber-800: #633806; --amber-900: #412402;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg-primary: #1a1a1a;
    --bg-secondary: #2c2c2a;
    --text-primary: #e8e6df;
    --text-secondary: #9c9a92;
    --text-tertiary: #6b6b65;
    --border-default: rgba(255,255,255,0.15);
    --border-hover: rgba(255,255,255,0.3);
  }
}

body {
  margin: 0;
  padding: 20px;
  background: var(--bg-primary);
  font-family: var(--font-sans);
}

.t  { font-family: var(--font-sans); font-size: 14px; font-weight: 400; fill: var(--text-primary); }
.ts { font-family: var(--font-sans); font-size: 12px; font-weight: 400; fill: var(--text-secondary); }
.th { font-family: var(--font-sans); font-size: 14px; font-weight: 500; fill: var(--text-primary); }
.arr { stroke: var(--text-tertiary); stroke-width: 1.5; }

.c-amber > rect { fill: var(--amber-50); stroke: var(--amber-600); }
.c-amber > .th  { fill: var(--amber-800); }
.c-amber > .ts  { fill: var(--amber-600); }

.c-blue > rect { fill: var(--blue-50); stroke: var(--blue-600); }
.c-blue > .th  { fill: var(--blue-800); }
.c-blue > .ts  { fill: var(--blue-600); }

.c-purple > rect { fill: var(--purple-50); stroke: var(--purple-600); }
.c-purple > .th  { fill: var(--purple-800); }
.c-purple > .ts  { fill: var(--purple-600); }

@media (prefers-color-scheme: dark) {
  .c-amber > rect { fill: var(--amber-900); stroke: var(--amber-200); }
  .c-amber > .th  { fill: var(--amber-100); }
  .c-amber > .ts  { fill: var(--amber-200); }

  .c-blue > rect { fill: var(--blue-900); stroke: var(--blue-200); }
  .c-blue > .th  { fill: var(--blue-100); }
  .c-blue > .ts  { fill: var(--blue-200); }

  .c-purple > rect { fill: var(--purple-900); stroke: var(--purple-200); }
  .c-purple > .th  { fill: var(--purple-100); }
  .c-purple > .ts  { fill: var(--purple-200); }
}
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 262">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
          markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
          stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Row 1: RB1 → SA1 → CA1 -->

<g class="c-amber">
  <rect x="40" y="40" width="170" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="125" y="58" text-anchor="middle" dominant-baseline="central">Residual block</text>
  <text class="ts" x="125" y="78" text-anchor="middle" dominant-baseline="central">AdaGN + t_emb</text>
</g>

<line x1="210" y1="68" x2="230" y2="68" class="arr" marker-end="url(#arrow)"/>

<g class="c-blue">
  <rect x="236" y="40" width="170" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="321" y="58" text-anchor="middle" dominant-baseline="central">Self-attention</text>
  <text class="ts" x="321" y="78" text-anchor="middle" dominant-baseline="central">Spatial context</text>
</g>

<line x1="406" y1="68" x2="426" y2="68" class="arr" marker-end="url(#arrow)"/>

<g class="c-purple">
  <rect x="432" y="40" width="170" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="517" y="58" text-anchor="middle" dominant-baseline="central">Cross-attention</text>
  <text class="ts" x="517" y="78" text-anchor="middle" dominant-baseline="central">text_emb</text>
</g>

<!-- Wrap arrow: CA1 bottom → RB2 top -->
<path d="M 517 96 L 517 131 L 125 131 L 125 160" fill="none" class="arr" marker-end="url(#arrow)"/>

<!-- Row 2: RB2 → SA2 → CA2 -->

<g class="c-amber">
  <rect x="40" y="166" width="170" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="125" y="184" text-anchor="middle" dominant-baseline="central">Residual block</text>
  <text class="ts" x="125" y="204" text-anchor="middle" dominant-baseline="central">AdaGN + t_emb</text>
</g>

<line x1="210" y1="194" x2="230" y2="194" class="arr" marker-end="url(#arrow)"/>

<g class="c-blue">
  <rect x="236" y="166" width="170" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="321" y="184" text-anchor="middle" dominant-baseline="central">Self-attention</text>
  <text class="ts" x="321" y="204" text-anchor="middle" dominant-baseline="central">Spatial context</text>
</g>

<line x1="406" y1="194" x2="426" y2="194" class="arr" marker-end="url(#arrow)"/>

<g class="c-purple">
  <rect x="432" y="166" width="170" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="517" y="184" text-anchor="middle" dominant-baseline="central">Cross-attention</text>
  <text class="ts" x="517" y="204" text-anchor="middle" dominant-baseline="central">text_emb</text>
</g>

</svg>
</body>
</html>
